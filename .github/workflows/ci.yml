name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        # `cache-bin: false` keeps `~/.cargo/bin` out of the cache. The
        # default behaviour stashes the rustup-managed `cargo` shim and
        # restores it on the next run, which on macOS reliably ends with
        # `rustup-init` (or a stale shim pointing at a removed toolchain)
        # serving as `cargo`. The first cargo invocation then fails with
        # `error: unexpected argument 'check' found`. The shim isn't worth
        # caching anyway — `dtolnay/rust-toolchain` re-installs it fresh
        # in every run.
        with:
          workspaces: "src-tauri -> target"
          cache-bin: "false"
      - run: npm ci
      - run: npm run build
      - name: Cargo check (src-tauri)
        working-directory: src-tauri
        run: cargo check --all-targets

  build-unix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        # `cache-bin: false` keeps `~/.cargo/bin` out of the cache. The
        # default behaviour stashes the rustup-managed `cargo` shim and
        # restores it on the next run, which on macOS reliably ends with
        # `rustup-init` (or a stale shim pointing at a removed toolchain)
        # serving as `cargo`. The first cargo invocation then fails with
        # `error: unexpected argument 'check' found`. The shim isn't worth
        # caching anyway — `dtolnay/rust-toolchain` re-installs it fresh
        # in every run.
        with:
          workspaces: "src-tauri -> target"
          cache-bin: "false"
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - run: npm ci
      - run: npm run build
      - name: Cargo check (src-tauri)
        working-directory: src-tauri
        run: cargo check --all-targets
